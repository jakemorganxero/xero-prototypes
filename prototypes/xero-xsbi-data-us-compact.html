<!--
  XERO PROTOTYPE
  Tool: Xero Small Business Insights — US Data Visualisation (Compact)
  Locale: US
  Built: 2026-05-05
  Data source: XSBI national data, March 2026 release
  Metrics: Sales YoY %, Time to be paid (days), Late payments (days)
  Pattern: 3 – Compact card (max-width 480px, 160px chart height)
  Notes for devs: Three separate compact cards — lay them out in a grid or drop individually
    into AEM columns. Each card is self-contained and independently switchable via range pills.
    GT Walsheim → DM Sans for prototyping.
-->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --xero-navy:       #1B3A4B;
    --xero-blue:       #13B5EA;
    --xero-panel-bg:   #EBF0F4;
    --xero-border:     #C2CDD6;
    --xero-text:       #1B3A4B;
    --xero-text-muted: #4A6070;
    --xero-green:      #1AB394;
    --xero-red:        #E05A5A;
    --radius:          6px;
  }

  .xsbi-compact-wrap {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--xero-text);
    padding: 32px 24px;
    /* Outer grid — shows three cards side by side for demo purposes.
       In AEM each .xsbi-compact card would be dropped into its own column. */
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 960px;
    margin: 0 auto;
  }

  /* Individual compact card */
  .xsbi-compact {
    background: #fff;
    border: 1px solid var(--xero-border);
    border-radius: var(--radius);
    padding: 20px;
    min-width: 0;
  }

  .xsbi-compact-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }

  .xsbi-compact-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--xero-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.3;
  }

  .xsbi-range { display: flex; gap: 3px; flex-shrink: 0; }
  .xsbi-range-btn {
    background: none;
    border: 1px solid var(--xero-border);
    border-radius: 20px;
    padding: 3px 9px;
    font-family: inherit;
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--xero-text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .xsbi-range-btn:hover { border-color: var(--xero-navy); color: var(--xero-navy); }
  .xsbi-range-btn.active { background: var(--xero-navy); border-color: var(--xero-navy); color: #fff; }

  .xsbi-compact-value-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .xsbi-compact-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--xero-navy);
    line-height: 1;
  }
  .xsbi-compact-value.positive { color: var(--xero-green); }
  .xsbi-compact-value.negative { color: var(--xero-red); }

  .xsbi-delta {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    line-height: 1.4;
  }
  .xsbi-delta.positive { background: rgba(26,179,148,0.12); color: var(--xero-green); }
  .xsbi-delta.negative { background: rgba(224,90,90,0.10); color: var(--xero-red); }
  .xsbi-delta.neutral  { background: var(--xero-panel-bg); color: var(--xero-text-muted); }

  .xsbi-compact-sublabel {
    font-size: 0.6875rem;
    color: var(--xero-text-muted);
    margin-bottom: 14px;
    margin-top: -10px;
  }

  .xsbi-compact-chart-wrap { height: 120px; }

  .xsbi-compact-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--xero-border);
  }
  .xsbi-compact-footer-swatch { width: 16px; height: 2px; border-radius: 1px; flex-shrink: 0; }
  .xsbi-compact-footer-label { font-size: 0.6875rem; color: var(--xero-text-muted); }

  @media (max-width: 720px) {
    .xsbi-compact-wrap { grid-template-columns: 1fr; }
  }
  @media (max-width: 960px) and (min-width: 721px) {
    .xsbi-compact-wrap { grid-template-columns: repeat(2, 1fr); }
  }
</style>

<div class="xsbi-compact-wrap">

  <!-- Card 1: Sales growth -->
  <div class="xsbi-compact">
    <div class="xsbi-compact-top">
      <div class="xsbi-compact-label">Sales growth</div>
      <div class="xsbi-range">
        <button class="xsbi-range-btn" data-card="sales" data-range="1" onclick="setRange('sales',1)">1Y</button>
        <button class="xsbi-range-btn" data-card="sales" data-range="3" onclick="setRange('sales',3)">3Y</button>
        <button class="xsbi-range-btn active" data-card="sales" data-range="0" onclick="setRange('sales',0)">All</button>
      </div>
    </div>
    <div class="xsbi-compact-value-row">
      <div class="xsbi-compact-value positive">+3.6%</div>
      <span class="xsbi-delta positive">▲ 1.0pp vs Feb</span>
    </div>
    <div class="xsbi-compact-sublabel">Year-over-year, Mar 2026</div>
    <div class="xsbi-compact-chart-wrap">
      <canvas id="chart-sales"></canvas>
    </div>
    <div class="xsbi-compact-footer">
      <div class="xsbi-compact-footer-swatch" style="background:#13B5EA;"></div>
      <div class="xsbi-compact-footer-label">Sales YoY % · US · XSBI Mar 2026</div>
    </div>
  </div>

  <!-- Card 2: Time to be paid -->
  <div class="xsbi-compact">
    <div class="xsbi-compact-top">
      <div class="xsbi-compact-label">Time to be paid</div>
      <div class="xsbi-range">
        <button class="xsbi-range-btn" data-card="ttp" data-range="1" onclick="setRange('ttp',1)">1Y</button>
        <button class="xsbi-range-btn" data-card="ttp" data-range="3" onclick="setRange('ttp',3)">3Y</button>
        <button class="xsbi-range-btn active" data-card="ttp" data-range="0" onclick="setRange('ttp',0)">All</button>
      </div>
    </div>
    <div class="xsbi-compact-value-row">
      <div class="xsbi-compact-value">28.5 days</div>
      <span class="xsbi-delta negative">▼ 0.5d vs Feb</span>
    </div>
    <div class="xsbi-compact-sublabel">Seasonally adjusted, Mar 2026</div>
    <div class="xsbi-compact-chart-wrap">
      <canvas id="chart-ttp"></canvas>
    </div>
    <div class="xsbi-compact-footer">
      <div class="xsbi-compact-footer-swatch" style="background:#1AB394;"></div>
      <div class="xsbi-compact-footer-label">Days to payment · US · XSBI Mar 2026</div>
    </div>
  </div>

  <!-- Card 3: Late payments -->
  <div class="xsbi-compact">
    <div class="xsbi-compact-top">
      <div class="xsbi-compact-label">Late payment days</div>
      <div class="xsbi-range">
        <button class="xsbi-range-btn" data-card="late" data-range="1" onclick="setRange('late',1)">1Y</button>
        <button class="xsbi-range-btn" data-card="late" data-range="3" onclick="setRange('late',3)">3Y</button>
        <button class="xsbi-range-btn active" data-card="late" data-range="0" onclick="setRange('late',0)">All</button>
      </div>
    </div>
    <div class="xsbi-compact-value-row">
      <div class="xsbi-compact-value">8.4 days</div>
      <span class="xsbi-delta positive">▼ 0.4d vs Feb</span>
    </div>
    <div class="xsbi-compact-sublabel">Avg. overdue, Mar 2026</div>
    <div class="xsbi-compact-chart-wrap">
      <canvas id="chart-late"></canvas>
    </div>
    <div class="xsbi-compact-footer">
      <div class="xsbi-compact-footer-swatch" style="background:#E05A5A;"></div>
      <div class="xsbi-compact-footer-label">Avg. late days · US · XSBI Mar 2026</div>
    </div>
  </div>

</div>

<script>
const RAW = {
  labels: ["01/2017","02/2017","03/2017","04/2017","05/2017","06/2017","07/2017","08/2017","09/2017","10/2017","11/2017","12/2017","01/2018","02/2018","03/2018","04/2018","05/2018","06/2018","07/2018","08/2018","09/2018","10/2018","11/2018","12/2018","01/2019","02/2019","03/2019","04/2019","05/2019","06/2019","07/2019","08/2019","09/2019","10/2019","11/2019","12/2019","01/2020","02/2020","03/2020","04/2020","05/2020","06/2020","07/2020","08/2020","09/2020","10/2020","11/2020","12/2020","01/2021","02/2021","03/2021","04/2021","05/2021","06/2021","07/2021","08/2021","09/2021","10/2021","11/2021","12/2021","01/2022","02/2022","03/2022","04/2022","05/2022","06/2022","07/2022","08/2022","09/2022","10/2022","11/2022","12/2022","01/2023","02/2023","03/2023","04/2023","05/2023","06/2023","07/2023","08/2023","09/2023","10/2023","11/2023","12/2023","01/2024","02/2024","03/2024","04/2024","05/2024","06/2024","07/2024","08/2024","09/2024","10/2024","11/2024","12/2024","01/2025","02/2025","03/2025","04/2025","05/2025","06/2025","07/2025","08/2025","09/2025","10/2025","11/2025","12/2025","01/2026","02/2026","03/2026"],
  sales: [4.6,2.8,3.8,1.8,4.7,3.8,3,3.1,2.2,3.5,3.4,2.8,3.7,4.2,3.3,5.3,4.2,3.6,5.2,4.2,3.5,5.5,4.3,3.8,4.2,4.1,3.6,4.5,3.9,2.7,4.7,3.3,4.5,3.5,2.9,5,-7.7,-10.6,2.9,2.3,0.9,8.2,5.7,9.3,9.9,2.2,7.6,18.2,32.4,30.8,28.6,18,22.4,20.1,15.8,21.7,14.7,19.7,16.7,14,10.4,13.3,9.5,7.6,10.8,6.6,6.2,5,0.6,3.9,1.9,0.1,-2.6,1.6,-0.7,-0.5,-0.4,-1.8,1.7,-0.5,2,2.7,3.9,0.1,7.6,0.3,-0.7,6.2,-0.1,3.3,6.4,1.3,4.9,1.7,0.9,3,1.7,2.7,4.5,2.7,2.5,7.2,0.3,2.3,4.1,1.3,2.6,3.6],
  ttp:   [30.8,29.6,30.2,29.6,31,29.3,29.8,30.4,29.7,31.4,28.6,29.6,30.5,29.7,28,29.3,28.4,27.9,28.4,29.5,28.2,26.8,27.8,29.2,28,29.1,29,29.5,29.1,30,29.5,29.1,29.2,29.5,29.8,29,29.2,29.4,30.1,30,30,29.9,29.4,28.5,29.1,27.8,28.5,27.5,27.4,25.4,26.3,25.9,25.5,25.7,25.3,26.7,26.5,27.5,26.9,27.5,27.7,28.6,28.9,28.6,30,28.1,30,29.8,30,30.2,29.5,30.1,29.6,29.6,29.6,30,30,30.2,29.8,30.2,30,29.6,29.2,29.9,29.7,29.6,34.3,27.5,28.1,28.8,28.7,29.3,30.1,28.6,29.3,26.5,28.9,28.4,29.6,29.2,29.6,27.7,29.2,28.2,28.3,29,28.9,27.1,28.8,29,28.5],
  late:  [10.2,9.3,10.3,9.2,10.1,8.7,10.1,9.7,9.2,11.1,9.3,9.1,9.8,9.4,8.7,9.3,8.5,8.6,8.5,9.1,8.9,8.1,8.8,9.3,8.4,9.6,8.9,9.3,9.1,10.1,8.9,9.1,8.9,9.1,9,9,9.1,8.8,9.2,9.7,9.7,9.9,9.4,8.6,8.8,8.1,8.8,7.6,7.6,6.8,7,6.4,6.3,5.9,6.2,6.2,6.9,7.7,7.5,7.6,7.9,8.6,8.9,8.4,8.5,8,8.9,9.2,8.7,9.1,8.5,9,9,9.4,9.5,9.1,9.4,9.1,8.6,9.1,9.4,8.5,8.8,15.1,8.4,7.8,9.1,9.2,9.1,9.5,9.4,9.1,7.8,8.7,8.6,10.4,9.3,9.3,8.3,8.8,8.3,8.3,8.6,8.5,8.2,9.8,8.8,8.4]
};

const CFG = {
  sales: { canvasId: 'chart-sales', color: '#13B5EA', fill: 'rgba(19,181,234,0.13)', unit: '%', fmt: v=>(v>=0?'+':'')+v.toFixed(1)+'%' },
  ttp:   { canvasId: 'chart-ttp',   color: '#1AB394', fill: 'rgba(26,179,148,0.12)', unit: 'd', fmt: v=>v.toFixed(1)+'d' },
  late:  { canvasId: 'chart-late',  color: '#E05A5A', fill: 'rgba(224,90,90,0.10)',  unit: 'd', fmt: v=>v.toFixed(1)+'d' },
};

const charts = {};
const ranges = { sales: 0, ttp: 0, late: 0 };

function fmt(lbl) {
  const [m,y] = lbl.split('/');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+y;
}

function buildCard(key) {
  const c = CFG[key];
  const years = ranges[key];
  const n = years === 0 ? RAW.labels.length : years * 12;
  const labels = RAW.labels.slice(-n).map(fmt);
  const data = RAW[key].slice(-n);
  const canvas = document.getElementById(c.canvasId);

  if (charts[key]) { charts[key].destroy(); }

  const grad = canvas.getContext('2d').createLinearGradient(0,0,0,120);
  grad.addColorStop(0, c.fill);
  grad.addColorStop(1, 'rgba(255,255,255,0)');

  charts[key] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: c.color,
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: c.color,
        pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 2,
        fill: true,
        backgroundColor: grad,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(27,58,75,0.95)',
          titleColor: '#fff',
          bodyColor: 'rgba(255,255,255,0.8)',
          padding: 10,
          cornerRadius: 5,
          titleFont: { family:"'DM Sans',sans-serif", weight:'600', size:12 },
          bodyFont: { family:"'DM Sans',sans-serif", size:12 },
          callbacks: { title: i=>i[0].label, label: i=>' '+c.fmt(i.raw) }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: { display: false }
        },
        y: {
          grid: { color: 'rgba(194,205,214,0.4)' },
          border: { display: false },
          ticks: {
            color: '#4A6070',
            font: { family:"'DM Sans',sans-serif", size:10 },
            maxTicksLimit: 4,
            callback: v => v + c.unit,
          }
        }
      }
    }
  });
}

function setRange(key, years) {
  ranges[key] = years;
  document.querySelectorAll(`.xsbi-range-btn[data-card="${key}"]`).forEach(btn => {
    btn.classList.toggle('active', +btn.dataset.range === years);
  });
  buildCard(key);
}

buildCard('sales');
buildCard('ttp');
buildCard('late');
</script>
