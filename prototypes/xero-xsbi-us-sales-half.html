<!--
  XERO PROTOTYPE
  Tool: XSBI — US Sales Growth (Half-width card)
  Locale: US
  Built: 2026-05-05
  Data source: XSBI national data, March 2026 release
  Metrics: Sales YoY %
  Pattern: 3 – Compact card, max-width 480px. Drop into a 50% AEM column alongside copy/image.
  Notes for devs: Self-contained card — no surrounding layout assumed.
    GT Walsheim → DM Sans for prototyping.
-->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#1B3A4B;--blue:#13B5EA;--panel:#EBF0F4;--border:#C2CDD6;--muted:#4A6070;--green:#1AB394;--red:#E05A5A;--r:6px}
  .w{font-family:'DM Sans',-apple-system,sans-serif;color:var(--navy);max-width:480px;padding:24px}
  .card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px}
  .eyebrow{font-size:.6875rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
  .val-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .val{font-size:2rem;font-weight:700;line-height:1;color:var(--green)}
  .val.neg{color:var(--red)}
  .delta{font-size:.6875rem;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(26,179,148,.12);color:var(--green);white-space:nowrap}
  .delta.neg{background:rgba(224,90,90,.1);color:var(--red)}
  .sublabel{font-size:.6875rem;color:var(--muted);margin-top:4px}
  .range{display:flex;gap:3px;flex-shrink:0}
  .rb{background:none;border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-family:inherit;font-size:.6875rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
  .rb:hover{border-color:var(--navy);color:var(--navy)}
  .rb.on{background:var(--navy);border-color:var(--navy);color:#fff}
  .chart-wrap{height:150px;margin-bottom:12px}
  .footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap}
  .leg{display:flex;align-items:center;gap:6px;font-size:.6875rem;color:var(--muted)}
  .leg-sw{width:16px;height:2px;border-radius:1px;background:#13B5EA}
  .source{font-size:.625rem;color:var(--muted)}
</style>
<div class="w">
  <div class="card">
    <div class="card-top">
      <div>
        <div class="eyebrow">XSBI · United States</div>
        <div class="val-row">
          <div class="val">+3.6%</div>
          <span class="delta">▲ 1.0pp vs Feb</span>
        </div>
        <div class="sublabel">Sales growth YoY · Mar 2026</div>
      </div>
      <div class="range">
        <button class="rb" data-r="1" onclick="sr(1)">1Y</button>
        <button class="rb" data-r="3" onclick="sr(3)">3Y</button>
        <button class="rb on" data-r="0" onclick="sr(0)">All</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="c"></canvas></div>
    <div class="footer">
      <div class="leg"><div class="leg-sw"></div>Sales growth (YoY %)</div>
      <div class="source">Xero XSBI Mar 2026</div>
    </div>
  </div>
</div>
<script>
const L=["01/2017","02/2017","03/2017","04/2017","05/2017","06/2017","07/2017","08/2017","09/2017","10/2017","11/2017","12/2017","01/2018","02/2018","03/2018","04/2018","05/2018","06/2018","07/2018","08/2018","09/2018","10/2018","11/2018","12/2018","01/2019","02/2019","03/2019","04/2019","05/2019","06/2019","07/2019","08/2019","09/2019","10/2019","11/2019","12/2019","01/2020","02/2020","03/2020","04/2020","05/2020","06/2020","07/2020","08/2020","09/2020","10/2020","11/2020","12/2020","01/2021","02/2021","03/2021","04/2021","05/2021","06/2021","07/2021","08/2021","09/2021","10/2021","11/2021","12/2021","01/2022","02/2022","03/2022","04/2022","05/2022","06/2022","07/2022","08/2022","09/2022","10/2022","11/2022","12/2022","01/2023","02/2023","03/2023","04/2023","05/2023","06/2023","07/2023","08/2023","09/2023","10/2023","11/2023","12/2023","01/2024","02/2024","03/2024","04/2024","05/2024","06/2024","07/2024","08/2024","09/2024","10/2024","11/2024","12/2024","01/2025","02/2025","03/2025","04/2025","05/2025","06/2025","07/2025","08/2025","09/2025","10/2025","11/2025","12/2025","01/2026","02/2026","03/2026"];
const D=[4.6,2.8,3.8,1.8,4.7,3.8,3,3.1,2.2,3.5,3.4,2.8,3.7,4.2,3.3,5.3,4.2,3.6,5.2,4.2,3.5,5.5,4.3,3.8,4.2,4.1,3.6,4.5,3.9,2.7,4.7,3.3,4.5,3.5,2.9,5,-7.7,-10.6,2.9,2.3,0.9,8.2,5.7,9.3,9.9,2.2,7.6,18.2,32.4,30.8,28.6,18,22.4,20.1,15.8,21.7,14.7,19.7,16.7,14,10.4,13.3,9.5,7.6,10.8,6.6,6.2,5,0.6,3.9,1.9,0.1,-2.6,1.6,-0.7,-0.5,-0.4,-1.8,1.7,-0.5,2,2.7,3.9,0.1,7.6,0.3,-0.7,6.2,-0.1,3.3,6.4,1.3,4.9,1.7,0.9,3,1.7,2.7,4.5,2.7,2.5,7.2,0.3,2.3,4.1,1.3,2.6,3.6];
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmt=l=>{const[m,y]=l.split('/');return MO[+m-1]+' '+y};
const COVID_S=39,COVID_E=47;
let rng=0,ch=null;
const cvPlugin=(s,e,off,len)=>({id:'cv',beforeDatasetsDraw(c){const{ctx,chartArea:a,scales:sc}=c;const sl=s-off,el=e-off;if(el<0||sl>=len)return;const x0=sc.x.getPixelForValue(Math.max(0,sl)),x1=sc.x.getPixelForValue(Math.min(len-1,el));ctx.save();ctx.fillStyle='rgba(224,90,90,.07)';ctx.fillRect(x0,a.top,x1-x0,a.height);ctx.restore()}});
function build(){
  const n=rng===0?L.length:rng*12,off=L.length-n;
  const labels=L.slice(-n).map(fmt),data=D.slice(-n);
  const canvas=document.getElementById('c');
  if(ch){ch.destroy();ch=null}
  const grad=canvas.getContext('2d').createLinearGradient(0,0,0,150);
  grad.addColorStop(0,'rgba(19,181,234,.13)');grad.addColorStop(1,'rgba(255,255,255,0)');
  ch=new Chart(canvas,{type:'line',data:{labels,datasets:[{data,borderColor:'#13B5EA',borderWidth:1.5,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:'#13B5EA',pointHoverBorderColor:'#fff',pointHoverBorderWidth:2,fill:true,backgroundColor:grad,tension:.3}]},
    plugins:[cvPlugin(COVID_S,COVID_E,off,n)],
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(27,58,75,.95)',titleColor:'#fff',bodyColor:'rgba(255,255,255,.8)',padding:10,cornerRadius:5,titleFont:{family:"'DM Sans',sans-serif",weight:'600',size:12},bodyFont:{family:"'DM Sans',sans-serif",size:12},callbacks:{title:i=>i[0].label,label:i=>' '+(i.raw>=0?'+':'')+i.raw.toFixed(1)+'%'}}},
      scales:{x:{grid:{display:false},border:{display:false},ticks:{display:false}},y:{grid:{color:'rgba(194,205,214,.4)'},border:{display:false},ticks:{color:'#4A6070',font:{family:"'DM Sans',sans-serif",size:10},maxTicksLimit:4,callback:v=>(v>=0?'+':'')+v+'%'}}}}});
}
function sr(r){rng=r;document.querySelectorAll('.rb').forEach(b=>b.classList.toggle('on',+b.dataset.r===r));build()}
build();
</script>
